<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen-Zénior</title>
    <link rel="icon" type="image/png" href="./assets/img/icono.png">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/modules.css">
    <link rel="stylesheet" href="./css/accessibility.css">
</head>
<body>
    <main class="app">
        <section id="pantallaMenu" class="pantalla activa">
            <div class="encabezado-menu">
                <div class="logo">
                    <img src="./assets/img/Logo.webp" alt="Logo Gen-Zénior">
                </div>

                <button id="btnNicoMenu" class="boton-nico" aria-label="Escuchar bienvenida de Nico">
                    <img src="./assets/img/icons/voz.svg" alt="" class="icono-nico">
                    <small>NICO</small>
                </button>

                <div id="mensajeNico" class="mensaje-nico">
                    Hola, soy Nico. Selecciona un módulo para empezar a aprender paso a paso.
                </div>
            </div>

            <nav id="menuPrincipal" class="menu-principal" aria-label="Módulos principales">
                <button class="boton-menu whatsapp" data-module="WhatsApp">
                    <span class="icono"></span>
                    <span>WhatsApp</span>
                    <img src="./assets/img/icons/flecha-derecha.svg" alt="" class="icono-flecha">
                </button>

                <button class="boton-menu facebook" data-module="Facebook">
                    <span class="icono"></span>
                    <span>Facebook</span>
                    <img src="./assets/img/icons/flecha-derecha.svg" alt="" class="icono-flecha">
                </button>

                <button class="boton-menu youtube" data-module="YouTube">
                    <span class="icono"></span>
                    <span>YouTube</span>
                    <img src="./assets/img/icons/flecha-derecha.svg" alt="" class="icono-flecha">
                </button>

                <button class="boton-menu contactos" data-module="Contactos">
                    <span class="icono"></span>
                    <span>Contactos</span>
                    <img src="./assets/img/icons/flecha-derecha.svg" alt="" class="icono-flecha">
                </button>
            </nav>

            <div class="menu-secundario">
                <button id="btnTrofeos" class="boton-abajo">
                    <img src="./assets/img/icons/trofeo.svg" alt="" class="icono-abajo-img">
                    <span>Trofeos</span>
                </button>

                <button id="btnAjustes" class="boton-abajo">
                    <img src="./assets/img/icons/ajustes.svg" alt="" class="icono-abajo-img">
                    <span>Ajustes</span>
                </button>
            </div>
        </section>

        <section id="pantallaNiveles" class="pantalla pantalla-niveles">
            <header id="encabezadoModulo" class="encabezado-modulo">
                <div>
                    <p>Módulo de</p>
                    <h2 id="tituloModulo">WhatsApp</h2>
                </div>

                <button id="btnVolverMenu" class="boton-volver" aria-label="Volver al menú">
                    <img src="./assets/img/icons/flecha-izquierda.svg" alt="" class="icono-volver">
                </button>
            </header>

            <div class="ayuda-voz">
                <button id="btnNicoModulo" type="button" class="boton-nico-modulo" aria-label="Escuchar ayuda de Nico para seleccionar niveles">
                    <img src="./assets/img/icons/voz.svg" alt="" class="icono-nico">
                    <small>NICO</small>
                </button>

                <div id="mensajeNicoModulo" class="mensaje-nico-modulo">
                    Escoge un nivel para practicar paso a paso.
                </div>
            </div>

            <div id="listaNiveles" class="lista-niveles"></div>
        </section>
    </main>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
